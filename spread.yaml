project: dashcraft
kill-timeout: 90m
workers: 1

environment:
  CI: "$(HOST: echo $CI)"

backends:
  lxd:
    type: adhoc
    allocate: |
      BASE="${BASE:-noble}"
      VM_NAME="${VM_NAME:-dashcraft-ubuntu-${BASE}-${RANDOM}}"
      DISK="${DISK:-40}"
      CPU="${CPU:-4}"
      MEM="${MEM:-8}"

      cloud_config="$(mktemp)"
      sed "s|SPREAD_PASSWORD|$SPREAD_PASSWORD|g" tests/spread/cloud-config.yaml > "$cloud_config"

      lxc launch --vm \
        "ubuntu:${BASE}" \
        "${VM_NAME}" \
        -c user.user-data="$(cat "$cloud_config")" \
        -c limits.cpu="${CPU}" \
        -c limits.memory="${MEM}GiB" \
        -d root,size="${DISK}GiB"

      # Wait for the spread user
      while ! lxc exec "${VM_NAME}" -- id -u spread &>/dev/null; do sleep 0.5; done

      rm "$cloud_config"

      # Set the instance address for spread
      ADDRESS "$(lxc ls -f csv | grep "${VM_NAME}" | cut -d"," -f3 | cut -d" " -f1)"
    discard: |
      instance_name="$(lxc ls -f csv | grep dashcraft | grep $SPREAD_SYSTEM_ADDRESS | cut -f1 -d",")"
      lxc delete -f $instance_name

    systems:
      - ubuntu-24.04:
          username: spread
          workers: 1

  github-ci:
    type: adhoc
    manual: true
    allocate: |
      sudo sed -i "s|#PasswordAuthentication yes|PasswordAuthentication yes|g" /etc/ssh/sshd_config
      sudo sed -i "s|KbdInteractiveAuthentication no|KbdInteractiveAuthentication yes|g" /etc/ssh/sshd_config
      sudo rm -f /etc/ssh/sshd_config.d/60-cloudimg-settings.conf /etc/ssh/sshd_config.d/50-cloud-init.conf
      sudo systemctl daemon-reload
      sudo systemctl restart ssh

      sudo useradd spread -s /bin/bash -m
      echo "spread:$SPREAD_PASSWORD" | sudo chpasswd
      echo 'spread ALL=(ALL) NOPASSWD:ALL ' | sudo tee /etc/sudoers.d/99-spread-user

      ADDRESS "127.0.0.1"
    discard: |
      sudo userdel -f -r spread || true
      sudo rm -f /etc/sudoers.d/99-spread-user

    systems:
      - ubuntu-24.04:
          username: spread
          workers: 1

suites:
  tests/spread/:
    summary: Spread tests

exclude:
  - dist/
  - .git
  - .github

# Spread runs tests as root, so the project tree must live under /root so
# snap-confined tooling (juju, charmcraft) can read it.
path: /root/proj

prepare: |
  snap refresh --hold
  if systemctl is-enabled unattended-upgrades.service; then
    systemctl stop unattended-upgrades.service || echo 'Self-hosted runner?'
    systemctl mask unattended-upgrades.service
  fi

  # Bootstrap Juju on microk8s via concierge. Gives every test a
  # `concierge-microk8s:admin/testing` model plus charmcraft for packing.
  sudo snap install concierge --classic
  sudo concierge prepare -p microk8s

  # uv is needed to install both dashcraft (from source) and juju-cantrip
  # (which provides the `quickpack` CLI that `dashcraft pack` invokes).
  # Installed via the official script — there is no `uv` snap.
  curl -LsSf https://astral.sh/uv/install.sh | env UV_INSTALL_DIR=/usr/local/bin UV_NO_MODIFY_PATH=1 sh

  # Install juju-cantrip as a uv tool so `quickpack` lands on PATH.
  UV_TOOL_BIN_DIR=/usr/local/bin uv tool install juju-cantrip

  # If a dashcraft binary was uploaded alongside the tree, put it on PATH.
  # Otherwise, build and install from source so integration tests can run.
  if [[ -f "$SPREAD_PATH/dashcraft" ]]; then
    chmod a+x "$SPREAD_PATH/dashcraft"
    sudo cp "$SPREAD_PATH/dashcraft" /usr/local/bin/dashcraft
  else
    cd "$SPREAD_PATH"
    uv venv --system-site-packages
    . .venv/bin/activate
    uv pip install -e .
    ln -sf "$(pwd)/.venv/bin/dashcraft" /usr/local/bin/dashcraft
  fi

restore: |
  if [[ -z "${CI:-}" ]]; then
    sudo concierge restore || true
  fi
