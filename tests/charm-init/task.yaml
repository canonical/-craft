summary: Scaffolded charm has the expected top-level files
systems:
  - ubuntu-24.04

environment:
  NAME: init-smoke

execute: |
  source "$SPREAD_PATH/tests/charm-helpers.sh"
  scaffold_charm

  # `scaffold_charm` leaves us in the charm dir.
  for f in charmcraft.yaml src/charm.py pyproject.toml tox.ini; do
    test -f "$f" || { echo "missing expected file: $f" >&2; exit 1; }
  done

restore: |
  source "$SPREAD_PATH/tests/charm-helpers.sh"
  cleanup
