summary: A freshly scaffolded charm passes `tox run -e lint`
systems:
  - ubuntu-24.04

environment:
  NAME: lint-smoke

execute: |
  source "$SPREAD_PATH/tests/spread/charm-helpers.sh"
  scaffold_charm

  sudo snap install tox --classic 2>/dev/null || true
  tox run -e lint

restore: |
  source "$SPREAD_PATH/tests/spread/charm-helpers.sh"
  cleanup
