summary: dashcraft pack clones a real upstream and produces a valid charm
systems:
  - ubuntu-24.04

execute: |
  source "$SPREAD_PATH/tests/spread/charm-helpers.sh"

  work_dir="$(task_workdir)"
  expected_name="$(yaml_get "$work_dir/dashcraft.yaml" name)"

  # Run pack and assert the user-facing progress messages.
  OUTPUT="$(dashcraft pack --project-dir "$work_dir" 2>&1)"
  echo "$OUTPUT"

  echo "$OUTPUT" | MATCH "Packing charm '${expected_name}'"
  echo "$OUTPUT" | MATCH "Cloned upstream to:"
  echo "$OUTPUT" | MATCH "Upstream source ready"

  charm_file="$(ls -1 "$work_dir"/*.charm 2>/dev/null | head -n1)"
  [[ -n "$charm_file" ]] || { echo "FAIL: no .charm produced" >&2; exit 1; }
  echo "Packed: $charm_file"

  verify_charm "$charm_file" "$work_dir/verify" "$expected_name"

  rm -rf "$work_dir"
