summary: dashcraft pack clones a real upstream repository
systems:
  - ubuntu-24.04

execute: |
  # Create a project directory with a dashcraft.yaml pointing at a small,
  # fast-to-clone public repo.
  local work_dir="/root/work-clone-smoke"
  rm -rf "$work_dir"
  mkdir -p "$work_dir"

  cat > "$work_dir/dashcraft.yaml" << 'EOF'
  name: clone-smoke
  summary: Smoke test for upstream cloning
  description: Verifies dashcraft pack can clone an upstream repo
  type: charm

  parts:
    charm:
      plugin: -craft
      upstream: https://github.com/canonical/pebble.git
      model: gpt-4
  EOF

  # dashcraft pack should clone the upstream and report success.
  OUTPUT="$(dashcraft pack --project-dir "$work_dir" 2>&1)"
  echo "$OUTPUT"

  # Verify expected output messages.
  echo "$OUTPUT" | MATCH "Project directory:"
  echo "$OUTPUT" | MATCH "Packing charm 'clone-smoke'"
  echo "$OUTPUT" | MATCH "Cloned upstream to:"
  echo "$OUTPUT" | MATCH "Upstream source ready"

  # Clean up.
  rm -rf "$work_dir"
