name: suite-docs
summary: Suite Numerique Docs charm
description: A charm for Suite Numerique Docs.
type: charm

parts:
  charm:
    plugin: -craft
    upstream: https://github.com/suitenumerique/docs.git
    # Upstream's Helm chart (src/helm/impress/values.yaml) points at the
    # `lasuite/impress-backend` and `lasuite/impress-frontend` Docker Hub
    # images. There are no semver tags published — only `latest`, `main`,
    # PR builds, and signed-digest tags. Charm wraps the backend.
    workload: docker.io/lasuite/impress-backend:latest
