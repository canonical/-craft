summary: dashcraft pack rejects an invalid dashcraft.yaml
systems:
  - ubuntu-24.04

execute: |
  # The sibling dashcraft.yaml is missing the required 'upstream' field in
  # the charm part.
  local work_dir="/root/work-invalid-config"
  rm -rf "$work_dir"
  mkdir -p "$work_dir"
  cp "$SPREAD_PATH/tests/spread/pack-invalid-config/dashcraft.yaml" "$work_dir/dashcraft.yaml"

  rc=0
  OUTPUT="$(dashcraft pack --project-dir "$work_dir" 2>&1)" || rc=$?
  echo "$OUTPUT"

  if [[ $rc -eq 0 ]]; then
    echo "FAIL: Expected non-zero exit code" >&2
    rm -rf "$work_dir"
    exit 1
  fi

  echo "$OUTPUT" | MATCH "'upstream' is required"

  # Clean up.
  rm -rf "$work_dir"
