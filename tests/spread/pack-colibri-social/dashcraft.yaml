name: colibri-social
summary: Colibri.social charm
description: A charm for Colibri.social.
type: charm

parts:
  charm:
    plugin: -craft
    upstream: https://github.com/colibri-social/colibri.social.git
    # NEEDS-ROCKCRAFT: colibri-social has no published OCI image. Upstream
