summary: Pack a Colibri.social charm (source-only — no upstream image)
systems:
  - ubuntu-24.04

# Note: colibri-social has no published OCI image yet (NEEDS-ROCKCRAFT in
# dashcraft.yaml). This suite only validates that the pack pipeline
# produces a structurally-valid charm; there is no matching deploy suite
# until we either publish an image or teach dashcraft to drive
# rockcraft.

execute: |
  source "$SPREAD_PATH/tests/spread/charm-helpers.sh"
  pack_and_verify
