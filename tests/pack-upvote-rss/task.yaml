summary: Scaffold, pack, and deploy an upvote-rss charm
# Upstream: https://github.com/johnwarne/upvote-rss
systems:
  - ubuntu-24.04

environment:
  NAME: upvote-rss
  WORKLOAD_IMAGE: ghcr.io/johnwarne/upvote-rss:latest

execute: |
  source "$SPREAD_PATH/tests/charm-helpers.sh"
  pack_and_deploy

restore: |
  source "$SPREAD_PATH/tests/charm-helpers.sh"
  cleanup
