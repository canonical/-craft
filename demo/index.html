<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>dashcraft demo</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/asciinema-player@3/dist/bundle/asciinema-player.css">
<style>
  :root {
    --bg: #0e0e10;
    --fg: #eaeaea;
    --muted: #8a8a93;
    --accent: #ffae00;
  }
  html, body {
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    font: 14px/1.45 system-ui, sans-serif;
    min-height: 100%;
  }
  header {
    padding: 18px 24px 0;
    display: flex;
    align-items: baseline;
    gap: 16px;
  }
  h1 { margin: 0; font-size: 18px; letter-spacing: 0.5px; }
  h1 .accent { color: var(--accent); }
  header .meta { color: var(--muted); font-size: 12px; }
  main {
    padding: 12px 24px 24px;
  }
  .player-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 220 / 64;       /* matches record.sh COLSxROWS */
    max-width: 100%;
    background: black;
  }
  .player-wrap .asciinema-player {
    width: 100%;
    height: 100%;
  }
  .controls {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 0;
    color: var(--muted);
    font-size: 13px;
  }
  .controls button {
    background: transparent;
    border: 1px solid var(--muted);
    color: var(--fg);
    border-radius: 6px;
    padding: 6px 12px;
    cursor: pointer;
    font: inherit;
  }
  .controls button:hover { border-color: var(--accent); color: var(--accent); }
  .controls label { display: inline-flex; gap: 8px; align-items: center; }
  footer {
    padding: 12px 24px 24px;
    color: var(--muted);
    font-size: 12px;
  }
  code { background: #1d1d22; padding: 1px 5px; border-radius: 4px; }
</style>
</head>
<body>
<header>
  <h1>dashcraft <span class="accent">·</span> recorded demo</h1>
  <span class="meta">four panes in parallel · four OpenRouter providers</span>
</header>

<main>
  <div class="player-wrap">
    <div id="player"></div>
  </div>

  <div class="controls">
    <button id="play-btn">▶ Play</button>
    <button id="restart-btn">⟲ Restart</button>
    <label>
      speed
      <select id="speed">
        <option value="1">1x</option>
        <option value="2">2x</option>
        <option value="3">3x</option>
        <option value="4" selected>4x</option>
        <option value="6">6x</option>
        <option value="8">8x</option>
      </select>
    </label>
  </div>
</main>

<footer>
  Cast file: <code>dashcraft-demo.cast</code> ·
  Re-record with <code>demo/record.sh</code>.
</footer>

<script src="https://cdn.jsdelivr.net/npm/asciinema-player@3/dist/bundle/asciinema-player.min.js"></script>
<script>
(function () {
  const playerEl = document.getElementById('player');
  const playBtn  = document.getElementById('play-btn');
  const restartBtn = document.getElementById('restart-btn');
  const speedSel = document.getElementById('speed');

  let player = null;
  let speed  = parseFloat(speedSel.value);

  function buildPlayer() {
    if (player) { player.dispose(); }
    player = AsciinemaPlayer.create('dashcraft-demo.cast', playerEl, {
      speed: speed,
      idleTimeLimit: 2,
      theme: 'asciinema',
      fit: 'both',
      controls: true,
      preload: true,
    });
  }

  playBtn.addEventListener('click', () => {
    if (!player) return;
    player.play();
  });

  restartBtn.addEventListener('click', () => {
    if (!player) return;
    player.seek(0);
    player.play();
  });

  speedSel.addEventListener('change', () => {
    speed = parseFloat(speedSel.value);
    buildPlayer();   // asciinema-player 3.x has no live speed setter.
  });

  buildPlayer();
})();
</script>
</body>
</html>
