name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run unit tests
        run: make unit

  # ---------------------------------------------------------------------
  # Spread matrix is split into two tracks:
  #   - pack-*  & dashcraft-* & pack-clone-*: run end-to-end pack but stop
  #     at unzip-and-verify. Cheap-ish, but they invoke pi → require an
  #     API key (OPENROUTER_API_KEY) so the matrix only runs when the
  #     secret is configured.
  #   - deploy-*: pack + deploy onto concierge-microk8s and wait for
  #     active. Slow; gated behind a label or manual dispatch.
  # ---------------------------------------------------------------------

  define-pack-matrix:
    name: Define pack-test matrix
    runs-on: ubuntu-latest
    outputs:
      suites: ${{ steps.suites.outputs.suites }}
      empty: ${{ steps.suites.outputs.empty }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: List pack suites
        id: suites
        run: |
          # All non-"deploy-" task dirs are pack-style tests.
          list="$(find tests/spread -mindepth 1 -maxdepth 1 -type d \
                   ! -name 'deploy-*' \
                   -exec test -f '{}/task.yaml' ';' -printf '%f\n' \
                 | jq -r -ncR '[inputs | select(length>0)]')"
          if [[ -z "$list" || "$list" == "[]" ]]; then
            echo "empty=true" >> "$GITHUB_OUTPUT"
            echo "suites=[]" >> "$GITHUB_OUTPUT"
          else
            echo "empty=false" >> "$GITHUB_OUTPUT"
            echo "suites=$list" >> "$GITHUB_OUTPUT"
          fi

  pack-spread:
    name: Spread pack (${{ matrix.suite }})
    runs-on: ubuntu-24.04
    needs:
      - define-pack-matrix
    # Only attempt these when the OpenRouter key is configured. Forks/PRs
    # without secrets get a no-op.
    if: |
      needs.define-pack-matrix.outputs.empty == 'false'
      && (
        vars.HAS_OPENROUTER_KEY == 'true'
        || github.repository_owner == 'juju'
      )
    strategy:
      fail-fast: false
      matrix:
        suite: ${{ fromJSON(needs.define-pack-matrix.outputs.suites) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          architecture: amd64

      - name: Install spread
        run: go install github.com/canonical/spread/cmd/spread@latest

      - name: Run pack suite
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SUITE: ${{ matrix.suite }}
        run: spread -v "github-ci:ubuntu-24.04:tests/spread/${SUITE}"

  deploy-spread:
    name: Spread deploy (${{ matrix.suite }})
    runs-on: ubuntu-24.04
    # Slow + flaky-prone. Gate behind a label so PRs don't pay for it by
    # default; main-branch pushes still exercise it.
    if: |
      (
        github.event_name == 'push'
        || contains(github.event.pull_request.labels.*.name, 'run-deploy-tests')
      )
      && (
        vars.HAS_OPENROUTER_KEY == 'true'
        || github.repository_owner == 'juju'
      )
    strategy:
      fail-fast: false
      matrix:
        suite:
          - deploy-upvote-rss
          - deploy-booklore
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          architecture: amd64

      - name: Install spread
        run: go install github.com/canonical/spread/cmd/spread@latest

      - name: Run deploy suite
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SUITE: ${{ matrix.suite }}
        run: spread -v "github-ci:ubuntu-24.04:tests/spread/${SUITE}"
