repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-toml
      - id: debug-statements

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.31.1
    hooks:
      - id: check-github-workflows

  - repo: local
    hooks:
      - id: make-format
        name: make format
        entry: make format
        language: system
        types: [python]
        pass_filenames: false
      - id: make-lint
        name: make lint
        entry: make lint
        language: system
        types: [python]
        pass_filenames: false
      - id: make-unit
        name: make unit
        entry: make unit
        language: system
        types: [python]
        pass_filenames: false

ci:
  # pre-commit.ci doesn't have uv/python 3.14 available, so skip the
  # make-driven hooks there. Our GitHub Actions CI runs them instead.
  skip: [make-format, make-lint, make-unit]
  autofix_commit_msg: "style: auto-fix from pre-commit hooks"
  autoupdate_commit_msg: "chore: update pre-commit hooks"
